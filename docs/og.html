<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=1200, initial-scale=1" />
<meta name="robots" content="noindex, nofollow" />
<title>OG preview</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400&family=Outfit:wght@200;300;400;500;600;700&family=IM+Fell+English+SC&display=swap" rel="stylesheet" />
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 1200px; height: 630px; overflow: hidden; }
  :root {
    --void: #05030f;
    --void-2: #0b0820;
    --purple: #7b3ff2;
    --pink: #f25fd0;
    --blue: #4f8cff;
    --star: #f7f3ff;
    --muted: #b3a9d9;
    --serif: "Cormorant Garamond", Georgia, serif;
    --sans: "Outfit", system-ui, sans-serif;
  }
  .canvas {
    position: relative; width: 1200px; height: 630px;
    /* Galaxy palette emulating the old preview: indigo base, purple +
       magenta glows, a blue pool toward the bottom. Keeps the bottom edge
       in the indigo-purple range that yields a pretty iMessage caption. */
    background:
      radial-gradient(ellipse 52% 50% at 85% 88%, rgba(224,76,168,0.52) 0%, transparent 60%),
      radial-gradient(ellipse 52% 52% at 15% 88%, rgba(120,58,222,0.50) 0%, transparent 62%),
      radial-gradient(ellipse 70% 42% at 50% 112%, rgba(56,68,150,0.45) 0%, transparent 60%),
      linear-gradient(165deg, #1b1238 0%, #150e2c 55%, #181138 100%);
    display: grid; place-items: center; overflow: hidden;
  }
  /* Starfield */
  .stars { position: absolute; inset: 0; z-index: 1; }
  .stars i {
    position: absolute; border-radius: 50%; background: #fff;
    box-shadow: 0 0 3px rgba(255,255,255,0.6);
  }
  /* Wings backdrop — same asset as the site's dark hero */
  .wings {
    position: absolute; inset: 0; z-index: 1;
    background: url('assets/Gemini_Generated_Image_n4ukl5n4ukl5n4uk.png') center 46% / 112% no-repeat;
    mix-blend-mode: screen;
    filter: brightness(1.05) saturate(1.4) contrast(1.05);
    opacity: 0.92;
  }
  /* Soft, purple-toned darkening so the title stays legible — kept off the
     bottom edge so the caption-sampled color stays indigo, not black. */
  .scrim {
    position: absolute; inset: 0; z-index: 1;
    background:
      radial-gradient(ellipse 58% 50% at 50% 42%, rgba(22,12,48,0.45) 0%, rgba(22,12,48,0.12) 50%, transparent 72%);
  }
  .inner {
    position: relative; z-index: 2; text-align: center;
    display: grid; justify-items: center; gap: 22px;
    padding: 0 80px; transform: translateY(-6px);
  }
  .eyebrow {
    font-family: var(--sans); font-size: 24px; letter-spacing: 0.42em;
    text-transform: uppercase; color: var(--pink); font-weight: 400;
    text-shadow: 0 0 18px rgba(242,95,208,0.45);
  }
  h1 {
    font-family: "IM Fell English SC", Georgia, serif;
    font-weight: 400; font-style: italic; font-size: 116px;
    letter-spacing: 0.06em; line-height: 1.08;
    background: linear-gradient(120deg, var(--star), var(--pink) 50%, var(--blue));
    -webkit-background-clip: text; background-clip: text; color: transparent;
    filter: drop-shadow(0 0 34px rgba(242,95,208,0.45))
            drop-shadow(0 0 70px rgba(180,130,255,0.25));
  }
  .tagline {
    font-family: var(--serif); font-style: italic; font-size: 40px;
    color: var(--muted); letter-spacing: 0.01em;
    text-shadow: 0 2px 20px rgba(5,3,15,0.8);
  }
  /* corner star accents */
  .star-accent { position: absolute; z-index: 2; color: var(--pink); opacity: 0.7;
    font-family: var(--serif); }
</style>
</head>
<body>
  <div class="canvas">
    <div class="stars" id="stars"></div>
    <div class="wings"></div>
    <div class="scrim"></div>
    <div class="inner">
      <p class="eyebrow">Astrology &amp; Soul Guidance</p>
      <h1>Valkyrie<br>No&nbsp;Jutsu</h1>
      <p class="tagline">Your cosmic guide between worlds.</p>
    </div>
  </div>
  <script>
    // Deterministic starfield (seeded) so re-renders are identical.
    (function () {
      var seed = 7;
      function rnd() { seed = (seed * 1103515245 + 12345) & 0x7fffffff; return seed / 0x7fffffff; }
      var host = document.getElementById('stars');
      var html = '';
      for (var i = 0; i < 140; i++) {
        var x = rnd() * 100, y = rnd() * 100;
        var s = 0.6 + rnd() * 1.8;            // size 0.6–2.4px
        var o = 0.25 + rnd() * 0.65;          // opacity
        html += '<i style="left:' + x.toFixed(2) + '%;top:' + y.toFixed(2) +
                '%;width:' + s.toFixed(2) + 'px;height:' + s.toFixed(2) +
                'px;opacity:' + o.toFixed(2) + '"></i>';
      }
      host.innerHTML = html;
    })();
  </script>
</body>
</html>
